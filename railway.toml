[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm build && npx prisma generate"

[deploy]
startCommand = "npx prisma db push && node dist/server/node-build.mjs"
healthcheckPath = "/api/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Works with: Railway, Koyeb, Render, Fly.io
# DATABASE_URL must be a PostgreSQL connection string in production
# e.g. postgresql://user:pass@host/dbname?sslmode=require
